site_name: GH-600 Exam Prep
site_url: https://JohannesRabauer.github.io/gh-600-preparation/
site_description: 'Pass the GitHub Certified Agentic AI Developer (GH-600) exam - comprehensive study guide with practice questions and mock exams'
use_directory_urls: true

theme:
  name: material
  custom_dir: docs/overrides
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sidebar
    - navigation.tabs
    - navigation.path
    - navigation.indexes
    - navigation.footer
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font: false
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - assets/css/custom.css
  - assets/css/quiz.css

extra_javascript:
  - assets/js/quiz.js
  - assets/js/progress.js

extra:
  social: []

nav:
  - Home: index.md
  - Study Guide: study_notes.md
  - Practice Questions: questions.md
  - Mock Exams:
      - Overview: mock_exam.md
      - "Mock Exam 1": mock_exam_1.md
      - "Mock Exam 2": mock_exam_2.md
      - "Mock Exam 3": mock_exam_3.md
